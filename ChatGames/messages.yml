game_started: '&8[%prefix%&8] &aHas iniciado un evento de chat %game% en tu chat!'

#Puedes usar <center> si deseas hacerlo en los siguientes 4 mensajes.
top:
  header: '&b&m---------&e&lTOP CHAT&b&m---------'
  format: '&c%spot%. &f%player% &8| &e&l%points% &7puntos'
  player-stat-format: '&7Has conseguido &e&l%player_points% &7victorias'
  footer: '&b&m---------------------------'
  
  no_data_message: '&8[%prefix%&8] &cTodavía no hay datos! Gana un juego de chat y consigue puntos!'

help_command:
  - '&7&m-------------------------------------------------'
  - '&e&l-ChatGames-'
  - '&6'
  - '&6&lCOMANDOS:'
  - '&6'
  - '&a/chatgames (tipo) &f- &3Inicia instantáneamente el tipo de evento especificado.'
  - '&a/chatgames top &f- &3Muestra los 10 mejores jugadores con más puntos.'
  - '&a/chatgames toggle &f- &3Activa o desactiva los juegos.'
  - '&a/chatgames reload &f- &3Recarga el archivo config.yml.'
  - '&6'
  - '&2&lTIPOS DE JUEGO:'
  - '&5unscramble, unreverse, reaction, random,  math, trivia'
  - '&7&m-------------------------------------------------'
  
#Usa <center> en los mensajes de LISTA para centrar los mensajes; las líneas con esto serán centradas!

  
#############################
##  MENSAJES DE CHATGAME   ##
#############################

#PUEDES USAR "%display_name%" COMO REEMPLAZO DE %player% EN correct_message PARA TODOS LOS JUEGOS.
unscramble:
    gameStartAnnouncement: 
      - ''
      - '<center>&r✓ ✯ %prefix%&r ✯ ✓'
      - ''
      - '<center>&fTienes &e%timeToGuess% segundos &fpara &dordenar&f: `&b%word%&f`'
      - ''
    correct_message: 
      - ''
      - '<center>&r✓ ✯ %prefix% &r✯ ✓'
      - ''
      - '<center>&a%player% &7ha ordenado correctamente `&e%correct_answer%&7` (&c%time%s&7) y recibió un premio!'
      - ''
    time_expired_message:
      - ''
      - '<center>&r✓ ✯ %prefix%&r ✯ ✓'
      - ''
      - '<center>&fHan pasado &e%timeToGuess%s&c! &fEl juego de ordenar ha terminado!'
      - '<center>La respuesta correcta era &e%correct_answer%&f!'
      - ''

