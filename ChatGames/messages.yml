unknown_command: '&8[%prefix%&8] &cComando desconocido.'
config_reloaded: '&8[%prefix%&8] &fLos archivos de configuración han sido recargados!'
not_enough_permissions: '&8[%prefix%&8] &cNo tienes suficientes permisos para ejecutar este comando!'
